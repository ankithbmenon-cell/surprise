
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Surprise for Maaammmmm 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Brush Script MT', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #fad5e5 40%, #fec7dd 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating romantic props */
        .floating-heart {
            position: absolute;
            color: rgba(255, 80, 120, 0.25);
            font-size: 2.8rem;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: float 7s infinite ease-in-out;
        }
        .heart1 { top: 8%; left: 4%; animation-delay: 0s; }
        .heart2 { bottom: 12%; right: 6%; font-size: 4.5rem; animation-delay: 1.5s; }
        .heart3 { top: 22%; right: 12%; animation-delay: 0.8s; }
        .heart4 { bottom: 28%; left: 10%; animation-delay: 2.2s; }
        .heart5 { top: 60%; left: 18%; animation-delay: 0.4s; }
        .heart6 { top: 45%; right: 5%; font-size: 3.2rem; animation-delay: 1.8s; }

        .rose-petal {
            position: absolute;
            background: rgba(255, 120, 160, 0.2);
            width: 35px;
            height: 35px;
            border-radius: 150% 0 150% 0;
            transform: rotate(45deg);
            pointer-events: none;
            z-index: 0;
        }
        .petal1 { top: 25%; right: 18%; background: #ffa5c3; opacity: 0.4; }
        .petal2 { bottom: 8%; left: 22%; background: #ff85b3; opacity: 0.5; transform: rotate(70deg); }
        .petal3 { top: 75%; left: 78%; background: #ffa5c3; opacity: 0.3; width: 50px; height: 50px; }

        .cupid-arrow {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            transform: rotate(-15deg);
            bottom: 6%;
            left: 12%;
            z-index: 1;
        }

        /* Main card */
        .card {
            width: 780px;
            max-width: 94%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 35px 50px rgba(210, 80, 130, 0.25), 0 10px 30px rgba(255, 100, 150, 0.4), inset 0 2px 15px rgba(255, 255, 255, 0.9);
            padding: 2.5rem 2rem 3rem;
            text-align: center;
            border: 4px solid rgba(255, 220, 240, 0.9);
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 3.2rem;
            color: #a6356e;
            text-shadow: 3px 3px 0 #ffbfd7;
            margin-bottom: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .question {
            font-size: 2.5rem;
            font-weight: 500;
            background: rgba(255, 245, 250, 0.7);
            display: inline-block;
            padding: 0.6rem 2.8rem;
            border-radius: 60px;
            color: #ac4f7c;
            box-shadow: 0 4px 0 #d98bb8;
            margin-bottom: 2.8rem;
            font-family: 'Comic Sans MS', cursive, 'Segoe UI';
            backdrop-filter: blur(4px);
        }

        .button-panel {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }

        .choice-btn {
            border: none;
            background: white;
            font-size: 2.4rem;
            font-weight: bold;
            padding: 1.2rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 0 #b34d7a, 0 8px 20px #f9a9c9;
            transition: 0.08s linear;
            color: #682c4e;
            border: 3px solid #ffd2e8;
            min-width: 200px;
            letter-spacing: 1px;
            transform: translateY(0);
            font-family: 'Comic Sans MS', cursive, 'Segoe UI';
        }

        .choice-btn:active {
            box-shadow: 0 4px 0 #b34d7a;
            transform: translateY(8px);
        }

        .surprise-btn {
            background: #ffe2f0;
            color: #a52d6e;
        }

        .no-surprise-btn {
            background: #edd0de;
            color: #62344b;
        }

        /* Pages */
        .page-surprise, .page-no-surprise {
            display: none;
        }

        /* No surprise page - crying white tiger cub */
        .tiger-cry-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .tiger-cry-box svg {
            width: 300px;
            height: auto;
            filter: drop-shadow(0 18px 12px #b08aa0);
            border-radius: 50px;
            background: rgba(255, 241, 248, 0.6);
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .tiger-text {
            font-size: 3rem;
            font-family: 'Comic Sans MS', cursive, 'Segoe UI';
            color: #5e3a4b;
            background: rgba(255, 220, 240, 0.7);
            padding: 0.8rem 2.5rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            box-shadow: 0 5px 0 #d596b6;
            border: 3px solid white;
            font-weight: bold;
        }

        /* Surprise page - large bouquet */
        .surprise-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        .big-bouquet {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            filter: drop-shadow(0 20px 18px #d67aa8);
            margin: 10px 0;
        }

        .flower-row-big {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bloom-big {
            font-size: 5.5rem;
            line-height: 1.2;
            animation: sway 4s infinite alternate ease-in-out;
        }
        .bloom-big:nth-child(1) { animation-delay: 0s; }
        .bloom-big:nth-child(2) { animation-delay: 0.3s; font-size: 6rem; }
        .bloom-big:nth-child(3) { animation-delay: 0.7s; font-size: 6.5rem; }
        .bloom-big:nth-child(4) { animation-delay: 1.1s; }
        .bloom-big:nth-child(5) { animation-delay: 0.5s; font-size: 6rem; }
        .bloom-big:nth-child(6) { animation-delay: 0.9s; }
        .bloom-big:nth-child(7) { animation-delay: 0.2s; font-size: 6.2rem; }

        .greenery-big {
            font-size: 4rem;
            line-height: 1;
            letter-spacing: 8px;
            color: #4f7a4f;
            text-shadow: 0 4px 3px #a3c9a3;
            margin-top: -5px;
        }

        .surprise-message {
            background: #fff9fb;
            padding: 1.8rem 3rem;
            border-radius: 200px 200px 80px 80px;
            font-size: 2.6rem;
            font-family: 'Brush Script MT', cursive, 'Comic Sans MS';
            color: #a13567;
            box-shadow: 0 15px 0 #e2a6c2, 0 10px 30px #fec7dd;
            border: 5px dashed #ffacc7;
            line-height: 1.4;
            max-width: 95%;
            background: #fff0f7;
            transform: rotate(-1deg);
            font-weight: bold;
        }

        .back-button {
            margin-top: 30px;
            background: #ffd2e2;
            border: none;
            padding: 0.9rem 3rem;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #7b3f5c;
            box-shadow: 0 7px 0 #c2789f;
            cursor: pointer;
            transition: 0.05s linear;
            border: 3px solid white;
        }
        .back-button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #c2789f;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes sway {
            0% { transform: rotate(-6deg) translateY(0); }
            100% { transform: rotate(6deg) translateY(-10px); }
        }

        /* Show/hide pages */
        .page-start, .page-surprise, .page-no-surprise { display: none; }
        .active-page { display: block !important; }
        #pageNoSurprise.active-page { display: flex; }
        #pageSurprise.active-page { display: block; }

        footer {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #d25989;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- Romantic floating decorations -->
    <div class="floating-heart heart1">❤️</div>
    <div class="floating-heart heart2">🌸</div>
    <div class="floating-heart heart3">💘</div>
    <div class="floating-heart heart4">🌹</div>
    <div class="floating-heart heart5">💖</div>
    <div class="floating-heart heart6">🌷</div>
    <div class="rose-petal petal1"></div>
    <div class="rose-petal petal2"></div>
    <div class="rose-petal petal3"></div>
    <div class="cupid-arrow">🏹</div>

    <!-- Main card -->
    <div class="card" id="mainCard">
        <!-- Page 1: Start (default) -->
        <div id="pageStart" class="page-start active-page">
            <h1>💕 For my Maaammmmm 💕</h1>
            <div class="question">What would you like?</div>
            <div class="button-panel">
                <button class="choice-btn surprise-btn" id="surpriseBtn">🎁 Surprise for maam</button>
                <button class="choice-btn no-surprise-btn" id="noSurpriseBtn">😿 No surprise</button>
            </div>
            <footer>choose with your heart 💗</footer>
        </div>

        <!-- Page 2: No surprise - crying white tiger cub -->
        <div id="pageNoSurprise" class="page-no-surprise tiger-cry-box">
            <!-- Crying white tiger cub SVG -->
            <svg viewBox="0 0 220 220" width="300" height="300">
                <!-- Body / head -->
                <ellipse cx="110" cy="110" rx="65" ry="70" fill="#f5f0eb" stroke="#b8a99a" stroke-width="4"/>
                <!-- Ears -->
                <ellipse cx="65" cy="55" rx="22" ry="25" fill="#f5f0eb" stroke="#b8a99a" stroke-width="4"/>
                <ellipse cx="155" cy="55" rx="22" ry="25" fill="#f5f0eb" stroke="#b8a99a" stroke-width="4"/>
                <ellipse cx="65" cy="55" rx="14" ry="18" fill="#ffd9e6" stroke="none"/>
                <ellipse cx="155" cy="55" rx="14" ry="18" fill="#ffd9e6" stroke="none"/>
                <!-- Face -->
                <!-- Eyes (big, sad, looking down) -->
                <ellipse cx="80" cy="105" rx="14" ry="18" fill="white" stroke="#3f2d1e" stroke-width="3"/>
                <ellipse cx="140" cy="105" rx="14" ry="18" fill="white" stroke="#3f2d1e" stroke-width="3"/>
                <!-- Pupils down -->
                <circle cx="80" cy="118" r="7" fill="#1f140e"/>
                <circle cx="140" cy="118" r="7" fill="#1f140e"/>
                <!-- Tears -->
                <line x1="90" y1="130" x2="96" y2="155" stroke="#7ab0ff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
                <line x1="130" y1="130" x2="124" y2="155" stroke="#7ab0ff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
                <circle cx="96" cy="160" r="6" fill="#a0c4ff" opacity="0.8"/>
                <circle cx="124" cy="160" r="6" fill="#a0c4ff" opacity="0.8"/>
                <!-- Nose -->
                <ellipse cx="110" cy="130" rx="12" ry="8" fill="#ffa5b0" stroke="#b34d6a" stroke-width="2"/>
                <!-- Sad mouth -->
                <path d="M80 155 Q110 130, 140 155" stroke="#3f2d1e" stroke-width="5" fill="none" stroke-linecap="round"/>
                <!-- Whiskers droopy -->
                <line x1="35" y1="120" x2="12" y2="130" stroke="#a08b7a" stroke-width="3" opacity="0.7"/>
                <line x1="35" y1="135" x2="12" y2="142" stroke="#a08b7a" stroke-width="3" opacity="0.7"/>
                <line x1="185" y1="120" x2="208" y2="130" stroke="#a08b7a" stroke-width="3" opacity="0.7"/>
                <line x1="185" y1="135" x2="208" y2="142" stroke="#a08b7a" stroke-width="3" opacity="0.7"/>
                <!-- Tiger stripes (faint) -->
                <path d="M70 80 L60 90 L70 95" stroke="#d6c9bc" stroke-width="4" fill="none" opacity="0.5"/>
                <path d="M150 80 L160 90 L150 95" stroke="#d6c9bc" stroke-width="4" fill="none" opacity="0.5"/>
                <path d="M95 70 L100 60 L105 70" stroke="#d6c9bc" stroke-width="4" fill="none" opacity="0.5"/>
                <path d="M125 70 L120 60 L115 70" stroke="#d6c9bc" stroke-width="4" fill="none" opacity="0.5"/>
                <!-- Sign held by paws (simplified) -->
                <rect x="45" y="170" width="130" height="40" rx="10" fill="#ffe8d0" stroke="#c49a7a" stroke-width="3"/>
                <text x="110" y="197" font-family="'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#6b3f2e" text-anchor="middle">pwease accept my surprise 🥺</text>
                <!-- paws holding sign -->
                <ellipse cx="55" cy="185" rx="15" ry="10" fill="#f5f0eb" stroke="#b8a99a" stroke-width="3"/>
                <ellipse cx="165" cy="185" rx="15" ry="10" fill="#f5f0eb" stroke="#b8a99a" stroke-width="3"/>
                <!-- Blush -->
                <circle cx="55" cy="120" r="10" fill="#ffa5b0" opacity="0.4"/>
                <circle cx="165" cy="120" r="10" fill="#ffa5b0" opacity="0.4"/>
            </svg>
            <div class="tiger-text">😿 no surprise? sad aaye</div>
            <button class="back-button" id="backFromNo">🔙 go back</button>
        </div>

        <!-- Page 3: Surprise - big bouquet of pink roses & lilac -->
        <div id="pageSurprise" class="page-surprise">
            <div class="surprise-wrapper">
                <h1 style="font-size: 2.8rem; margin-bottom: 0.2rem;">✨ For you, maam ✨</h1>
                
                <!-- Large bouquet -->
                <div class="big-bouquet">
                    <div class="flower-row-big">
                        <span class="bloom-big">🌹</span> <!-- pink rose -->
                        <span class="bloom-big">🌷</span> <!-- pink tulip -->
                        <span class="bloom-big">🌸</span> <!-- cherry blossom / pink -->
                        <span class="bloom-big">🌺</span> <!-- hibiscus / pink -->
                        <span class="bloom-big">🌹</span>
                        <span class="bloom-big">🌷</span>
                        <span class="bloom-big">🌸</span>
                    </div>
                    <div class="flower-row-big">
                        <span class="bloom-big">💐</span>
                        <span class="bloom-big">🌹</span>
                        <span class="bloom-big">🌷</span>
                        <span class="bloom-big">🌺</span>
                        <span class="bloom-big">🌸</span>
                        <span class="bloom-big">🌹</span>
                        <span class="bloom-big">💐</span>
                    </div>
                    <div class="greenery-big">🌿 🌱 🌿 🍃 🌿</div>
                </div>

                <!-- Message -->
                <div class="surprise-message">
                    surpriseee for my bestttesttttestt maaammm 💖
                </div>

                <button class="back-button" id="backFromSurprise">⬅️ back</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const pageStart = document.getElementById('pageStart');
            const pageSurprise = document.getElementById('pageSurprise');
            const pageNoSurprise = document.getElementById('pageNoSurprise');

            const surpriseBtn = document.getElementById('surpriseBtn');
            const noSurpriseBtn = document.getElementById('noSurpriseBtn');
            const backFromNo = document.getElementById('backFromNo');
            const backFromSurprise = document.getElementById('backFromSurprise');

            function showPage(activePage) {
                pageStart.classList.remove('active-page');
                pageSurprise.classList.remove('active-page');
                pageNoSurprise.classList.remove('active-page');
                activePage.classList.add('active-page');
            }

            // Surprise button -> show big bouquet page
            surpriseBtn.addEventListener('click', function() {
                showPage(pageSurprise);
            });

            // No surprise button -> crying tiger cub
            noSurpriseBtn.addEventListener('click', function() {
                showPage(pageNoSurprise);
            });

            // Back from no surprise
            backFromNo.addEventListener('click', function() {
                showPage(pageStart);
            });

            // Back from surprise
            backFromSurprise.addEventListener('click', function() {
                showPage(pageStart);
            });
        })();
    </script>

    <!-- Ensure pages are hidden properly -->
    <style>
        .page-start, .page-surprise, .page-no-surprise { display: none; }
        .active-page { display: block !important; }
        #pageNoSurprise.active-page { display: flex; }
        #pageSurprise.active-page { display: block; }
    </style>

    <!-- extra charm -->
    <div style="position: fixed; bottom: 8px; right: 12px; opacity: 0.25; font-size: 2.2rem; z-index: 30;">🌹💕🌹</div>
</body>
</html>
